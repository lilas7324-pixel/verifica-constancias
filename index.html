<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>Validación de Constancia</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:30px;
}

.card{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.valido{
color:green;
font-size:24px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h1>Verificación de Constancia</h1>

<p>Cargando información...</p>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const id = params.get("id");

if(id){

fetch(
"https://script.google.com/macros/s/AKfycbw-iQo8fFLbRUvlmbGlKDo9UzD6vLolrdpiAFltyRZeLYwneL6NIrtSb6VcKPq593lfXQ/exec?id="
+ id +
"&format=json"
)

.then(response => response.json())

.then(data => {

document.querySelector(".card").innerHTML = `

<h1>Verificación de Constancia</h1>

<p class="valido">
✅ Documento válido
</p>

<hr>

<p><strong>Estado:</strong> ${data.estado}</p>

<p><strong>Folio:</strong> ${data.folio}</p>

<p><strong>Nombre:</strong> ${data.nombre}</p>

<p><strong>Curso:</strong> ${data.curso}</p>

<p><strong>Horas:</strong> ${data.horas}</p>

<p><strong>Fecha:</strong> ${data.fecha}</p>

`;

})

.catch(error => {

document.querySelector(".card").innerHTML = `

<h1>Error</h1>

<p>No fue posible validar el documento.</p>

`;

});

}

</script>

</body>

</html>
